controller_manager:
  ros__parameters:
    update_rate: 50

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    wheel_velocity_controller:
      type: velocity_controllers/JointGroupVelocityController

    steering_position_controller:
      type: position_controllers/JointGroupPositionController

wheel_velocity_controller:
  ros__parameters:
    joints:
      - left_rear_wheel_joint
      - right_rear_wheel_joint
      - left_front_wheel_joint
      - right_front_wheel_joint
    command_interfaces:
      - velocity
    state_interfaces:
      - position
      - velocity
    gains:
      left_rear_wheel_joint: {p: 1.0, i: 0.1, d: 0.0, i_clamp: 0.0}
      right_rear_wheel_joint: {p: 1.0, i: 0.1, d: 0.0, i_clamp: 0.0}
      left_front_wheel_joint: {p: 1.0, i: 0.1, d: 0.0, i_clamp: 0.0}
      right_front_wheel_joint: {p: 1.0, i: 0.1, d: 0.0, i_clamp: 0.0}

steering_position_controller:
  ros__parameters:
    joints:
      - left_steering_hinge_joint
      - right_steering_hinge_joint
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity
    gains:
      left_steering_hinge_joint: {p: 10.0, i: 0.5, d: 0.5, i_clamp: 0.0}
      right_steering_hinge_joint: {p: 10.0, i: 0.5, d: 0.5, i_clamp: 0.0}
